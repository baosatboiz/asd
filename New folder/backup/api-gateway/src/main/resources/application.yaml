server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    loadbalancer:
      cache:
        ttl: 3s      # expire LB instance list every 3 s (aligns with registry-fetch-interval=2s)
        capacity: 256
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway

eureka:
  client:
    registry-fetch-interval-seconds: 2      # was 5 s — gateway refreshes instance list every 2 s
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.cloud.loadbalancer: DEBUG